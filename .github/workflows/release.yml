name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            output: twMQTTAgent-windows-amd64.exe
            archive: twMQTTAgent-windows-amd64.zip

          - goos: linux
            goarch: amd64
            output: twMQTTAgent-linux-amd64
            archive: twMQTTAgent-linux-amd64.tar.gz

          - goos: linux
            goarch: arm64
            output: twMQTTAgent-linux-arm64
            archive: twMQTTAgent-linux-arm64.tar.gz

          - goos: darwin
            goarch: amd64
            output: twMQTTAgent-darwin-amd64
            archive: twMQTTAgent-darwin-amd64.tar.gz

          - goos: darwin
            goarch: arm64
            output: twMQTTAgent-darwin-arm64
            archive: twMQTTAgent-darwin-arm64.tar.gz

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Build binary (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" -o ${{ matrix.output }} .

      - name: Create Archive
        run: |
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -j ${{ matrix.archive }} ${{ matrix.output }}
          else
            tar -czf ${{ matrix.archive }} ${{ matrix.output }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
